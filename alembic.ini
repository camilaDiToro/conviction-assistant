[alembic]
script_location = alembic
# The URL is overridden programmatically by app.store.db.migrate(), which
# points at settings.sqlite_path. The default below only matters if you
# invoke `alembic` from the CLI directly (e.g. `alembic revision -m "..."`).
sqlalchemy.url = sqlite:///data/conviction_assistant.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
