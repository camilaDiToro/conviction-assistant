# ---- multiturn (resolves a referent from a prior turn) -------------------

- id: q34
  question: "Para CDB de 25 meses."
  language: pt
  bucket: factual
  expected_passage_ids:
    - cdbs_quick_guide#tributacao-tabela-regressiva
  prior_turns:
    - role: user
      content: "Como funciona a tabela regressiva de IR?"
    - role: assistant
      content: "A tabela regressiva de IR é a tabela padrão de tributação de renda fixa no Brasil, com alíquotas que decrescem com o prazo de aplicação (22,5% até 180 dias, 20% até 360 dias, 17,5% até 720 dias, 15% acima de 720 dias). Para qual instrumento específico você gostaria de saber a aplicação?"
  notes: |
    Multiturn factual: the standalone follow-up "Para CDB de 25 meses"
    is meaningless without the prior turn. The rewrite stage must
    reconstruct "qual a alíquota de IR para CDB de 25 meses" and the
    agent must cite cdbs_quick_guide#tributacao-tabela-regressiva
    (25 months > 720 days → 15%). Tests rewrite + retrieval integration.

- id: q35
  question: "Does it cover LCAs as well?"
  language: en
  bucket: factual
  expected_passage_ids:
    - lci_lca_investimentos#garantia-do-fgc
  prior_turns:
    - role: user
      content: "Tell me about FGC coverage limits in Brazil."
    - role: assistant
      content: "The Fundo Garantidor de Créditos (FGC) covers up to R$250,000 per CPF per financial conglomerate, with a global cap of R$1,000,000 across all institutions, renewable every 4 years after a credit event. Which instrument did you have in mind?"
  notes: |
    Multiturn factual: "Does it cover LCAs as well?" requires resolving
    "it" → FGC and "as well" → in addition to whatever was implied prior.
    Rewrite must produce something like "does FGC cover LCAs". Expected
    citation is lci_lca_investimentos#garantia-do-fgc (yes — covered
    with same R$250k / R$1M limits). Cross-language case: prior assistant
    turn is in EN, but the canonical FGC-for-LCA passage is in PT.
