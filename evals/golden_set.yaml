# Golden evaluation set — 34 hand-authored questions.
#
# Schema (one entry per item):
#   id, question, language (pt|en|es), bucket
#     (factual|rule_a|rule_b|cross_lang|out_of_scope|clarify),
#   expected_passage_ids (optional, enables citation_recall),
#   must_cite_at_least (default 1; 0 for refuse/clarify paths),
#   expected_out_of_scope, expected_general_knowledge,
#   expected_conflict_mention, notes.
#
# All factual passage_ids were verified against the retrieval golden
# (tests/fixtures/retrieval_golden.yaml). Rule A / Rule B entries leave
# expected_passage_ids empty so the metric stays "any anchored passage
# is fine" — the harder behavior to validate (Rule B citing both sides;
# Rule A using general_knowledge flag correctly) is captured by the
# refusal_correctness / general_knowledge_correctness scores.
#
# Bucket distribution: 18 factual (incl. 2 multiturn), 5 rule_a, 3 rule_b,
# 3 cross_lang, 2 out_of_scope, 3 clarify (= 34).
# (0003-v2: q24 and q26 moved out_of_scope → rule_a; q31-q33 added to
# fill corpus coverage gaps; q34-q35 are multiturn factual questions
# requiring history resolution via the rewrite stage.
#  0006-fix: q26 rephrased + moved rule_a → factual; q03/q09/q32
#  expected_passage_ids expanded to accept the umbrella tax guide as a
#  valid alternate source.
#  0008: q17/q18/q19 rewritten against documented in-corpus contradictions
#  (FX necessity vs optional sizing; lajes corporativas structural bear vs
#  flight-to-quality; dividend governance signal vs dividend-trap warnings).
#  q20 removed — NTN-B vs debêntures incentivadas is a trade-off, not a
#  contradiction.)
# Languages distribution: PT 15, EN 15, ES 4.
#
# Multiturn questions carry an optional `prior_turns` list (see schema
# below) that the runner feeds to the agent as ConversationTurn history;
# the rewrite stage is what resolves coreference into a search query.

