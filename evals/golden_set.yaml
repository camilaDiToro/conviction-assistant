  expected_general_knowledge: true
  notes: |
    Corpus has zero coverage of US retirement accounts (Roth IRA, 401k,
    Traditional IRA). Confirmed via grep on 401k|Roth IRA|individual
    retirement: no matches. Topic-level framing (not "should I open
    one?") so out_of_scope refusal does not pre-empt Rule A. The agent
    should run a search, find nothing relevant, and fall back to general
    knowledge marked with general_knowledge_used=true.

