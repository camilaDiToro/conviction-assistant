# ---- rule_b (conflicting convictions — must cite both sides) -------------

- id: q17
  question: "Para um investidor brasileiro com sleeve de renda fixa relevante, as debêntures incentivadas devem ser tratadas como holding core (20–40% do sleeve), conforme a tese de portfolio construction da Decade, ou esse papel core cabe ao Tesouro Direto porque a Decade também afirma que o risco de crédito corporativo e a liquidez do secundário tornam as debêntures estruturalmente inferiores ao risco soberano?"
  language: pt
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    Conflito cross-doc, mesma equipe Decade. debentures_incentivadas_analysis
    (§"Portfolio Construction: Practical Guidance") afirma textualmente que
    "incentivized debentures should represent a core holding rather than a
    tactical satellite" e prescreve 20–40% do sleeve de renda fixa em
    portfolios wealth. tesouro_direto_estrategias_avancadas (§"6.
    Comparativo com Produtos Privados") contra-argumenta: "a debênture
    isenta é mais rentável líquida. Contudo, o risco de crédito corporativo
    é significativamente maior do que o risco soberano, e a liquidez no
    secundário de debêntures é estruturalmente inferior à do Tesouro." Os
    dois documentos defendem framings opostos do papel core no FI sleeve.
    Agente deve citar os dois lados e nomear explicitamente a divergência.

- id: q18
  question: "Para um cliente com mandato de FIIs de tijolo agressivo, Decade recomenda overweight ou underweight estrutural em lajes corporativas? §3 (Tipos de FIIs) afirma que o subsegmento sofre 'estruturalmente menor demanda' com vacância de 20–30% em São Paulo pós-trabalho híbrido, enquanto o H2 'Material de Referência Complementar: FIIs' (§11.1) sustenta que para lajes classe A+ 'a compressão de demanda é mais do que compensada' pela migração flight-to-quality."
  language: pt
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    Conflito interno em fundos_imobiliarios_completo entre dois H2: §3
    ("Tipos de FIIs e Estratégias") classifica lajes corporativas como
    estruturalmente fraco pós-trabalho-híbrido com vacância 20–30% em
    São Paulo; o H2 "Material de Referência Complementar: FIIs" (§11.1)
    afirma que para A+ a compressão é "mais do que compensada" pela
    migração de inquilinos B→A. As duas posições levam a recomendações
    opostas (underweight vs overweight A+). A pergunta cita ambos os
    lados textualmente para forçar o agente a reconhecer a divergência
    em vez de sintetizá-la em "selectivo." Agente deve citar os dois H2
    e marcar conflict_detected=true.

- id: q19
  question: "Should a Brazilian income-focused B3 portfolio treat Petrobras (PETR4) as part of the core dividend allocation — Decade explicitly lists PETR4 among 'Companies with Notable Dividend Histories' with a 5–25%+ yield — or should it be excluded from the cornerstone allocation given Decade's separate guidance that PETR4 dividends carry government-influence and oil-price risks that disqualify the name as a classic dividend aristocrat?"
  language: en
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    Internal contradiction within dividend_aristocrats_brazil between two H2
    sections of the same conviction document. §"Sectors Most Likely to
    Produce Reliable Dividends" / Oil and Gas: "Advisors should present
    Petrobras dividends as a high-yield/high-risk component of an income
    portfolio, not as a cornerstone." §"Companies with Notable Dividend
    Histories" lists Petrobras PN (PETR4) explicitly in the recognized
    notable-dividend-histories table at 5–25%+ yield. Same doc, two H2s,
    opposite framings of PETR4's role in a dividend portfolio. Agent must
    cite both H2 sections and name the divergence — "as Decade convictions
    disagree on whether PETR4 belongs in the core dividend allocation".

