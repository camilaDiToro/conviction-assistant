# ---- rule_b (conflicting convictions — must cite both sides) -------------

- id: q17
  question: "Vale mais a pena montar o núcleo de ações em ETFs passivos como BOVA11 e SMAL11, ou um gestor ativo de small caps consegue entregar retorno superior consistente após taxas?"
  language: pt
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    etfs_brasileiros_guia argues most active managers do not beat the
    benchmark net of fees and positions passive ETFs as the portfolio
    core; small_caps_investment_thesis argues the size premium is real
    and that SMAL11 forfeits the pricing-inefficiency edge that is the
    entire premise of small cap investing. Agent must cite BOTH and
    surface the disagreement.

- id: q18
  question: "São os FIIs uma classe de renda passiva estável, ou o risco de vacância em lajes corporativas torna a seleção de segmento crítica?"
  language: pt
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    fundos_imobiliarios_completo warns lajes corporativas vacancy is
    structurally higher post-COVID; dividend_aristocrats_brazil groups
    FIIs broadly as income vehicles without that warning. Conflict.

- id: q19
  question: "For a 30-year-old Brazilian investor with only BRL liabilities, is dollar exposure via IVVB11 a portfolio necessity or an optional diversification?"
  language: en
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    currency_exposure_strategies treats dollar exposure as structural
    necessity; etfs_brasileiros_guia positions IVVB11 as an option among
    others. Conflict on framing.

- id: q20
  question: "Para construir um colchão de longo prazo (15-20 anos) com retorno real protegido, é melhor concentrar em Tesouro IPCA+ direto (NTN-Bs soberanas) ou priorizar debêntures incentivadas que oferecem IPCA+ sem IR e taxas reais superiores, mas carregam risco de crédito corporativo?"
  language: pt
  bucket: rule_b
  must_cite_at_least: 2
  expected_conflict_mention: true
  notes: |
    Literal opposition between two convictions:
    ntnb_titulos_guia positions NTN-B as THE long-horizon real-yield
    instrument (sovereign credit, guaranteed real yield);
    debentures_incentivadas_analysis argues the tax exemption produces an
    after-tax advantage that beats sovereign for similar maturity. The
    answer must cite both AND name the disagreement.

